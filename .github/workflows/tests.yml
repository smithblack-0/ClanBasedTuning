name: tests

on:
  push:
  pull_request:

jobs:
  unit-and-lightning-contracts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install 'torch>=2.10,<2.11' --index-url https://download.pytorch.org/whl/cpu
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m pytest -m 'not requires_ray'

  ray-native-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install 'torch>=2.10,<2.11' --index-url https://download.pytorch.org/whl/cpu
      - run: python -m pip install -e '.[dev,ray]'
      - run: python -m pytest -m requires_ray -vv
